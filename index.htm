<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Tracking Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>💳 Payment Tracking Dashboard</h1>
        <p>Track hotel payments and revenue in real time</p>
    </header>

    <section class="stats">

        <div class="card">
            <h3>Total Revenue</h3>
            <h2 id="revenue">₹0</h2>
        </div>

        <div class="card">
            <h3>Total Payments</h3>
            <h2 id="paymentsCount">0</h2>
        </div>

        <div class="card">
            <h3>Highest Payment</h3>
            <h2 id="highestPayment">₹0</h2>
        </div>

        <div class="card">
            <h3>Average Payment</h3>
            <h2 id="averagePayment">₹0</h2>
        </div>

    </section>

    <section class="form-card">

        <h2>Add New Payment</h2>

        <form id="paymentForm">

            <input type="number" id="paymentId" placeholder="Payment ID" required>

            <input type="number" id="bookingId" placeholder="Booking ID" required>

            <input type="number" id="amount" placeholder="Amount" required>

            <input type="date" id="date" required>

            <select id="method" required>
                <option value="">Select Payment Method</option>
                <option>UPI</option>
                <option>Cash</option>
                <option>Credit Card</option>
                <option>Debit Card</option>
                <option>Net Banking</option>
            </select>

            <button type="submit">Add Payment</button>

        </form>

    </section>
    <section class="search-card">

    <label>Filter by Payment Method</label>

    <select id="filterMethod">

        <option value="All">All Methods</option>
        <option value="UPI">UPI</option>
        <option value="Cash">Cash</option>
        <option value="Credit Card">Credit Card</option>
        <option value="Debit Card">Debit Card</option>
        <option value="Net Banking">Net Banking</option>

    </select>

    <br><br>

    <label>Search Booking ID</label>

    <input
        type="text"
        id="search"
        placeholder="Search Booking ID">

</section>

    <section class="search-card">

        <input type="text"
               id="search"
               placeholder="🔍 Search Booking ID">

    </section>

    <section class="table-card">

        <h2>Payment Records</h2>

        <table>

            <thead>
                <tr>
                    <th>Payment ID</th>
                    <th>Booking ID</th>
                    <th>Amount</th>
                    <th>Method</th>
                    <th>Date</th>
                </tr>
            </thead>

            <tbody id="paymentTable">

            </tbody>

        </table>

    </section>
    <footer>
Built using HTML5, CSS3, JavaScript & Local Storage API
</footer>

    <script src="app.js"></script>

</body>
</html>
